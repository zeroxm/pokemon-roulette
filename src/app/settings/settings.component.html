<div class="row">
    <div class="col-12 col-sm-2">
      <div class="row py-4">
            <div class="col-6 col-sm-12 mb-2">
                <app-main-game-button></app-main-game-button>
            </div>
      </div>
    </div>
    <div class="col-12 col-sm-9">
        <div class="container text-center">
            <div class="mt-2 mb-4">
                <h3>
                    <ng-icon name="bootstrapGear"></ng-icon> {{ 'settings.label' | translate }} <ng-icon name="bootstrapGear"></ng-icon>
                </h3>
            </div>
            <div class="d-flex justify-content-center">
                <div class="row g-3" style="max-width: 500px;">
                    <div class="col-12">
                        <app-dark-mode-toggle></app-dark-mode-toggle>
                    </div>
                    <div class="col-12">
                        <div class="form-switch d-flex justify-content-between">
                            <label class="form-check-label" for="explanationsSwitch">
                                {{ 'settings.explanations' | translate }}
                            </label>
                            <input
                                class="form-check-input"
                                type="checkbox"
                                [checked]="(settings$ | async)?.lessExplanations"
                                (change)="onToggleVerbosity()"
                                id="explanationsSwitch">
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-switch d-flex justify-content-between">
                            <label class="form-check-label" for="muteAudioSwitch">
                                {{ 'settings.muteAudio' | translate }}
                            </label>
                            <input
                                class="form-check-input"
                                type="checkbox"
                                [checked]="(settings$ | async)?.muteAudio"
                                (change)="onToggleMuteAudio()"
                                id="muteAudioSwitch">
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-switch d-flex justify-content-between">
                            <label class="form-check-label" for="skipShinySwitch">
                                {{ 'settings.skipShinyRolls' | translate }}
                            </label>
                            <input
                                class="form-check-input"
                                type="checkbox"
                                [checked]="(settings$ | async)?.skipShinyRolls"
                                (change)="onToggleSkipShinyRolls()"
                                id="skipShinySwitch">
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="d-flex justify-content-between align-items-center">
                            <label class="form-check-label">
                                {{ 'settings.difficulty' | translate }}
                            </label>
                            <div class="btn-group btn-group-sm">
                                <button class="btn"
                                    [class.btn-success]="(settings$ | async)?.difficulty === 'easy'"
                                    [class.btn-outline-secondary]="(settings$ | async)?.difficulty !== 'easy'"
                                    (click)="onSetDifficulty('easy')">
                                    {{ 'settings.difficultyEasy' | translate }}
                                </button>
                                <button class="btn"
                                    [class.btn-warning]="(settings$ | async)?.difficulty === 'normal'"
                                    [class.btn-outline-secondary]="(settings$ | async)?.difficulty !== 'normal'"
                                    (click)="onSetDifficulty('normal')">
                                    {{ 'settings.difficultyNormal' | translate }}
                                </button>
                                <button class="btn"
                                    [class.btn-danger]="(settings$ | async)?.difficulty === 'hard'"
                                    [class.btn-outline-secondary]="(settings$ | async)?.difficulty !== 'hard'"
                                    (click)="onSetDifficulty('hard')">
                                    {{ 'settings.difficultyHard' | translate }}
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-switch d-flex justify-content-between">
                            <label class="form-check-label" for="nuzlockeSwitch">
                                {{ 'settings.nuzlocke' | translate }}
                            </label>
                            <input
                                class="form-check-input"
                                type="checkbox"
                                [checked]="(settings$ | async)?.nuzlockeMode"
                                (change)="onToggleNuzlockeMode()"
                                id="nuzlockeSwitch">
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-switch d-flex justify-content-between">
                            <label class="form-check-label" for="autoSpinSwitch">
                                {{ 'settings.autoSpin' | translate }}
                            </label>
                            <input
                                class="form-check-input"
                                type="checkbox"
                                [checked]="(settings$ | async)?.autoSpin"
                                (change)="onToggleAutoSpin()"
                                id="autoSpinSwitch">
                        </div>
                    </div>
                    <div class="col-12">
                        <app-language-selector></app-language-selector>
                    </div>
                </div>
            </div>
        </div>
    </div>
  </div>
