<div class="d-flex justify-content-between align-items-center">
  <label class="form-label mb-0">
    {{ 'settings.theme.label' | translate }}
  </label>
  <select
    class="form-select form-select-sm w-auto"
    (change)="onThemeChange($event)"
    [attr.aria-label]="'settings.theme.label' | translate">
    <option
      value="starters"
      [selected]="currentTheme === 'starters'">
      {{ 'settings.theme.starters' | translate }}
    </option>
    <option
      value="plain-dark"
      [selected]="currentTheme === 'plain-dark'">
      {{ 'settings.theme.plainDark' | translate }}
    </option>
    <option
      value="plain-light"
      [selected]="currentTheme === 'plain-light'">
      {{ 'settings.theme.plainLight' | translate }}
    </option>
  </select>
</div>
