<div class="d-flex justify-content-between align-items-center">
  <label class="form-check-label">
    {{ 'settings.theme' | translate }}
  </label>
  <div class="btn-group btn-group-sm">
    <button class="btn"
      [class.btn-light]="(theme$ | async) === 'light'"
      [class.btn-outline-secondary]="(theme$ | async) !== 'light'"
      (click)="onSetTheme('light')">
      {{ 'settings.themeLight' | translate }}
    </button>
    <button class="btn"
      [class.btn-dark]="(theme$ | async) === 'dark'"
      [class.btn-outline-secondary]="(theme$ | async) !== 'dark'"
      (click)="onSetTheme('dark')">
      {{ 'settings.themeDark' | translate }}
    </button>
    <button class="btn snowflake-btn"
      [class.active]="(theme$ | async) === 'snowflake'"
      [class.btn-outline-secondary]="(theme$ | async) !== 'snowflake'"
      (click)="onSetTheme('snowflake')">
      {{ 'settings.themeSnowflake' | translate }}
    </button>
  </div>
</div>
